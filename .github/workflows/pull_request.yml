name: PullRequest & Push master

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: merkaly-io/actions/setup@master

      - run: pnpm exec tsc --noEmit --pretty false

      - run: pnpm lint

      - run: pnpm build

      - run: npm pack --dry-run
