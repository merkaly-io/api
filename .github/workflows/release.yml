name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check tag is on master
        run: |
          git fetch origin master --force --tags
          git merge-base --is-ancestor "$GITHUB_SHA" origin/master

      - name: Check tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")"
          test "$TAG_VERSION" = "$PACKAGE_VERSION"

      - name: Setup Node 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck tooling
        run: pnpm exec tsc --noEmit --pretty false

      - name: Lint source
        run: pnpm lint

      - name: Build package
        run: pnpm build

      - name: Inspect package contents
        run: npm pack --dry-run

      - name: Publish package
        run: npm publish --access public

  release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: merkaly-io/actions/release@master
